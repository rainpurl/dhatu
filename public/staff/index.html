<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Dhātu Staff</title>
  <style>
    :root{ --brand:#8A1C3B; --ink:#33222A; --muted:#8C7C82; --bg:#F3ECE6; --card:#FBF5F1; --line:#ECE2E5; --gold:#E0A63C; --ok:#2F6E44; }
    *{box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}
    body{margin:0;background:var(--bg);color:var(--ink);min-height:100vh}
    .wrap{max-width:1000px;margin:0 auto;padding:28px 20px 60px}
    h1{font-size:24px;font-weight:800;letter-spacing:-.3px;margin:0 0 2px;display:flex;align-items:center;gap:10px}
    .mark{width:34px;height:34px;border-radius:11px;background:var(--brand);display:grid;place-items:center}
    .muted{color:var(--muted);font-size:13px}
    .center{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
    .card{background:var(--card);border-radius:16px;padding:22px;box-shadow:inset 0 1.5px 4px rgba(80,45,40,.16), inset 0 -1px 0 rgba(255,255,255,.55);width:100%;max-width:360px}
    input{width:100%;padding:12px 14px;border-radius:12px;border:none;background:#fff;font-size:16px;box-shadow:inset 0 2px 5px rgba(80,45,40,.16);margin-top:6px}
    button{cursor:pointer;font-weight:700;font-size:15px;border:none;border-radius:12px;padding:12px 18px;background:var(--brand);color:#fff;box-shadow:inset 0 2px 5px rgba(50,10,22,.4), inset 0 -1px 0 rgba(255,255,255,.14)}
    button.ghost{background:var(--card);color:var(--ink);box-shadow:inset 0 1.5px 4px rgba(80,45,40,.16)}
    .resetbtn{padding:6px 12px;font-size:12px}
    .err{color:#C22233;font-size:13px;font-weight:600}
    table{width:100%;border-collapse:collapse;background:var(--card);border-radius:14px;overflow:hidden;box-shadow:inset 0 1.5px 4px rgba(80,45,40,.12)}
    th,td{text-align:left;padding:11px 12px;font-size:13.5px;border-bottom:1px solid var(--line)}
    th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:800}
    tr:last-child td{border-bottom:none}
    td.num{font-weight:700}
    .bar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin:14px 0 18px}
    .stat{background:var(--card);border-radius:14px;padding:10px 16px;box-shadow:inset 0 1.5px 4px rgba(80,45,40,.14)}
    .stat b{font-size:20px;font-weight:800;display:block} .stat span{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .pic{width:26px;height:26px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDP2aEnKbwoZGG8doE648TO2GUZHN-JMNw",
      authDomain: "dhatu-9f586.firebaseapp.com",
      projectId: "dhatu-9f586",
      storageBucket: "dhatu-9f586.firebasestorage.app",
      messagingSenderId: "609155312765",
      appId: "1:609155312765:web:b80551884a4d187f745514",
    };

    // IMPORTANT: paste your own Firebase Auth UID here (Firebase console -> Authentication -> Users).
    // Only these accounts can load user data, enforced by Firestore security rules (see AUTH.md).
    const ADMIN_UIDS = ["NH62QQhxAYbY7sTUwgT8opdZUxo1", "bmHWHEPkcxgP3I5YREiCtEBRr8H2"];
    const STAFF_PASSWORD = "rain";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const el = document.getElementById("app");
    const mark = "<span class='mark'><svg viewBox='0 0 24 24' width='20' height='20' fill='none'><path d='M12.6 21.4C7.1 21.4 3.6 16.9 3.6 12 3.6 6.5 8 2.4 13.6 2.4c4.5 0 7.6 3.3 7.6 7.3 0 3.5-2.7 6.1-6 6.1-2.9 0-5-2.2-5-5 0-2.3 1.8-4 4-4 1.7 0 2.9 1 3.2 2.5' stroke='#fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/><circle cx='13.4' cy='11.3' r='1.45' fill='#fff'/><circle cx='7.4' cy='12.6' r='1.05' fill='#fff'/><circle cx='9.6' cy='7.4' r='1' fill='#fff'/><circle cx='12.2' cy='16.9' r='1' fill='#fff'/></svg></span>";

    let unlocked = sessionStorage.getItem("dhatu_staff_ok") === "1";

    function gate() {
      el.innerHTML = `<div class="center"><div class="card"><h1>${mark} Dhātu Staff</h1><p class="muted">Enter the staff password.</p><input id="pw" type="password" placeholder="Password" /><div style="height:10px"></div><button id="go" style="width:100%">Continue</button><div id="pwerr" class="err" style="margin-top:8px"></div></div></div>`;
      const input = document.getElementById("pw");
      const submit = () => {
        if (input.value === STAFF_PASSWORD) { unlocked = true; sessionStorage.setItem("dhatu_staff_ok", "1"); route(); }
        else document.getElementById("pwerr").textContent = "Incorrect password.";
      };
      document.getElementById("go").onclick = submit;
      input.onkeydown = (e) => { if (e.key === "Enter") submit(); };
      input.focus();
    }

    function signinView() {
      el.innerHTML = `<div class="center"><div class="card"><h1>${mark} Dhātu Staff</h1><p class="muted">Sign in with an authorized staff Google account.</p><div style="height:12px"></div><button id="si" style="width:100%">Sign in with Google</button><div id="sierr" class="err" style="margin-top:8px"></div></div></div>`;
      document.getElementById("si").onclick = async () => {
        try { await signInWithPopup(auth, provider); }
        catch (e) { document.getElementById("sierr").textContent = "Sign-in failed. " + (e.code || ""); }
      };
    }

    function notAuthorized(user) {
      el.innerHTML = `<div class="center"><div class="card"><h1>${mark} Not authorized</h1><p class="muted">${user.email || ""} is not a staff account.</p><p class="muted">Add this UID to ADMIN_UIDS and the Firestore rules:</p><input readonly value="${user.uid}" onclick="this.select()" /><div style="height:12px"></div><button id="out" class="ghost" style="width:100%">Sign out</button></div></div>`;
      document.getElementById("out").onclick = () => signOut(auth);
    }

    function num(v, d) { try { return JSON.parse(v); } catch { return d; } }

    async function dashboard(user) {
      el.innerHTML = `<div class="top"><h1>${mark} Dhātu Staff</h1><button id="out" class="ghost">Sign out</button></div><p class="muted" id="status">Loading users...</p>`;
      document.getElementById("out").onclick = () => signOut(auth);
      let docs;
      try {
        const snap = await getDocs(collection(db, "users"));
        docs = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      } catch (e) {
        document.getElementById("status").innerHTML = `<span class="err">Could not read users. Make sure the Firestore rules grant your UID read access (see AUTH.md). ${e.code || ""}</span>`;
        return;
      }
      const rows = docs.map((u) => {
        const p = u.progress || {};
        return {
          id: u.id,
          name: (u.profile && u.profile.name) || "",
          email: (u.profile && u.profile.email) || "",
          photo: (u.profile && u.profile.photo) || "",
          kaudi: num(p.dhatu_kaudi, 0) || 0,
          streak: num(p.dhatu_streak, 0) || 0,
          done: (num(p.dhatu_completed, []) || []).length,
          review: (num(p.dhatu_srs, []) || []).length,
          updated: u.updatedAt || 0,
        };
      }).sort((a, b) => b.updated - a.updated);
      const totalKaudi = rows.reduce((n, r) => n + r.kaudi, 0);
      const active7 = rows.filter((r) => r.updated && Date.now() - r.updated < 7 * 864e5).length;
      const fmt = (t) => t ? new Date(t).toLocaleDateString() : "";
      const esc = (s) => String(s).replace(/"/g, "&quot;");
      el.querySelector("#status").outerHTML = `
        <div class="bar">
          <div class="stat"><b>${rows.length}</b><span>Users</span></div>
          <div class="stat"><b>${active7}</b><span>Active (7d)</span></div>
          <div class="stat"><b>${totalKaudi}</b><span>Total Kaudi</span></div>
        </div>
        <table><thead><tr><th>User</th><th>Streak</th><th>Kaudi</th><th>Lessons</th><th>Review</th><th>Last active</th><th></th></tr></thead><tbody>
        ${rows.map((r) => `<tr>
          <td>${r.photo ? `<img class="pic" src="${r.photo}" referrerpolicy="no-referrer"/>` : ""}${r.name || "<span class='muted'>(no name)</span>"}<div class="muted">${r.email}</div></td>
          <td class="num">${r.streak}</td><td class="num">${r.kaudi}</td><td class="num">${r.done}</td><td class="num">${r.review}</td><td class="muted">${fmt(r.updated)}</td>
          <td><button class="resetbtn ghost" data-uid="${esc(r.id)}" data-name="${esc(r.name || r.email || r.id)}">Reset</button></td>
        </tr>`).join("")}
        </tbody></table>`;
      el.querySelectorAll(".resetbtn").forEach((b) => {
        b.onclick = async () => {
          if (!confirm("Reset all progress for " + b.dataset.name + "? This clears their streak, Kaudi, and lessons.")) return;
          b.disabled = true; b.textContent = "...";
          try {
            await setDoc(doc(db, "users", b.dataset.uid), { progress: {}, updatedAt: Date.now() }, { merge: true });
            dashboard(user);
          } catch (e) { b.disabled = false; b.textContent = "Reset"; alert("Reset failed: " + (e.code || e.message)); }
        };
      });
    }

    function route() {
      if (!unlocked) { gate(); return; }
      onAuthStateChanged(auth, (user) => {
        if (!user) signinView();
        else if (ADMIN_UIDS.includes(user.uid)) dashboard(user);
        else notAuthorized(user);
      });
    }

    route();
  </script>
</body>
</html>
